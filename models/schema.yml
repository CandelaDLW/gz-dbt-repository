# schema.yml

version: 2

sources:
  - name: raw
    schema: gz_raw_data
    tables:
      - name: product
        identifier: raw_gz_product
        columns:
          - name: products_id
            description: the identifier of each product
            tests:
              - unique
              - not_null
          - name: purchase_price
            description: the price of every purchase
      - name: sales
        identifier: raw_gz_sales
        description: sales of Greenweez / we have on row per product_id found in each orders_id
        columns:
          - name: date_date
            description: date of purchase
          - name: orders_id
            description: the identifier of each order
          - name: products_id
            description: the identifier of each product
          - name: revenue
            description: the revenue generated by every purchase
          - name: quantity
            description: the quantity purchased
        tests:
          - unique:
              column_name: "(orders_id || '-' || pdt_id)"

      - name: ship
        identifier: raw_gz_ship
        columns:
          - name: orders_id
            description: the identifier of each order
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: the fee of the shipping
          - name: logCost
            description: The logistic costs
          - name: ship_cost
            description: the shipping cost
